plugins {
    id 'java'
    id 'application' // Add this line
}

group = 'skool'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

application {
    // Use the full class name including the package, if any
    mainClass = 'myApplication.Login'
}
